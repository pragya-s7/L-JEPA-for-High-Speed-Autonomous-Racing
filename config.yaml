# L-JEPA Configuration

gym:
  # Path to the f1tenth_gym repo (old gym API)
  gym_path: /home/yim/f1tenth_gym
  timestep: 0.01
  integrator: RK4  # or Euler
  num_beams: 1080
  fov: 4.7  # radians (~269 degrees)

maps:
  # Maps available in the old gym. 'levine' needs a png (not present).
  - name: berlin
    map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/berlin
    map_ext: .png
    start_pose: [0.0, 0.0, 1.37]   # [x, y, theta]
  - name: skirk
    map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/skirk
    map_ext: .png
    start_pose: [0.0, 0.0, 0.0]
  - name: vegas
    map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/vegas
    map_ext: .png
    start_pose: [0.0, 0.0, 0.0]
  - name: stata_basement
    map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/stata_basement
    map_ext: .png
    start_pose: [0.0, 0.0, 0.0]

data_collection:
  output_dir: /home/yim/L-JEPA-for-High-Speed-Autonomous-Racing/data
  episodes_per_map: 20          # number of episodes per map
  # Stage 9: bumped 2000 → 3500. With SPEED_HIGH capped at 2.5 m/s in ppo.py,
  # a full berlin lap (72m) takes ~2900 steps minimum. Old 2000-step cap would
  # have made lap completion physically impossible during this curriculum.
  max_steps_per_episode: 3500   # max steps before reset (RL; use stuck reset for low speed)
  context_window: 4             # h: number of past scans fed to encoder
  prediction_horizon: 5         # k: steps ahead to predict
  min_episode_steps: 100        # discard very short episodes (collisions)
  controller: follow_the_gap    # or pure_pursuit

model:
  # LiDAR input: 1080 beams (raw) or subsampled
  lidar_subsample: 5            # take every Nth beam -> 1080/5 = 216 dims
  lidar_dim: 216                # = num_beams / lidar_subsample
  vel_dim: 2                    # [linear_vels_x, ang_vels_z]
  obs_dim: 218                  # lidar_dim + vel_dim (per timestep)
  context_window: 4             # h
  action_dim: 2                 # [steer, speed]
  latent_dim: 64                # d: encoder output dimension
  prediction_horizon: 5         # k: steps ahead to predict (must match data_collection)

  encoder:
    channels: [32, 64, 128]     # conv1d channel progression
    kernel_size: 5
    stride: 2

  predictor:
    hidden_dims: [256, 256]

pretrain:
  epochs: 100
  batch_size: 256
  lr: 5.0e-5
  weight_decay: 1.0e-5
  ema_decay: 0.996              # target encoder EMA decay
  prediction_horizon: 5         # k
  checkpoint_dir: /home/yim/L-JEPA-for-High-Speed-Autonomous-Racing/checkpoints/pretrain
  log_every: 10                 # log every N epochs
  # Dataset root. Falls back to data_collection.output_dir if not set.
  data_dir: /home/yim/Downloads/pretraining_data/data
  # Skip these maps when loading episodes (substring match, case-insensitive).
  # Levine is held out so we can evaluate transfer to it after pretraining.
  exclude_maps:
    - levine

rl:
  checkpoint_dir: /home/yim/L-JEPA-for-High-Speed-Autonomous-Racing/checkpoints/rl_v2
  encoder_checkpoint: /home/yim/L-JEPA-for-High-Speed-Autonomous-Racing/checkpoints/pretrain/epoch_0100.pt
  total_steps: 4_000_000
  rollout_steps: 8192           # steps per PPO update
  num_envs: 1
  # Stage 5: 1e-5 → 5e-6. The s4.5 policy learned to drive fast (3.6 m/s on
  # both maps) but oscillated wildly in training. Halving lr lets the policy
  # refine the fast-driving discovery without bouncing out of it.
  lr: 5.0e-6
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  epochs_per_update: 4
  minibatch_size: 256
  # Stage 9: 0.025 → 0.015. With SPEED_HIGH physically capped at 2.5 m/s
  # the policy no longer needs heavy exploration to discover slow speeds —
  # the action space itself is constrained. Lower entropy lets the policy
  # commit to a precise braking trajectory rather than wobbling.
  entropy_coef: 0.015
  value_coef: 0.5
  max_grad_norm: 0.5
  log_every: 5                  # log more frequently for monitoring
  eval_every: 20                # evaluate more frequently

  centerline_dir: /home/yim/L-JEPA-for-High-Speed-Autonomous-Racing/data/centerlines  # generated by rl/make_centerlines.py

  # Reward shaping (hybrid_dense_sparse branch). All scalars used by rl/rl_train.py — no silent defaults for key terms.
  reward:
    type: dense

    # --- Core track progress (centerline arc s from CSV; tracker uses sequential waypoints, not global NN) ---
    # Stage 7: restored to s1-era values. The 10×/30×/-300 reward shaping in
    # stages 4.5/5/6 destroyed s1's good behaviour because PPO can't keep a
    # policy stable across very different reward magnitudes. s1 (the actually
    # best policy: 55% berlin progress at 4.3 m/s) was trained with these
    # numbers — we preserve them and let the policy keep extending what it
    # already learned, just with more berlin exposure.
    progress_weight: 5.0           # per meter of forward delta_arc (clipped ±1 m/step in tracker)
    wrong_way_multiplier: 5.0      # extra penalty on negative delta_arc
    progress_bins: 10              # bin count for sparse + dense checkpoint crossing

    # --- Stay on track / point the right way ---
    # Stage 7: restored to s1-era 0.08. Higher values (0.12, 0.18) drove the
    # policy into corner-paranoia / slow-crawl regimes.
    deviation_weight: 0.08        # lateral distance to polyline (m)
    heading_weight: 0.05          # |heading_err| vs centerline tangent (rad); 0 = off

    # --- Speed: only when actually moving forward along the track (reduces "fast but wrong place") ---
    # Stage 7: restored to s1-era 0.06. 0.15 (Stage 4.5) made fast-crash
    # episodes net-positive on reward, which taught "plow through corners".
    speed_weight: 0.06
    # Stage 6 fix retained: gate stays at 0.005 (0.5 m/s) so corners that
    # require braking still earn speed reward proportional to vel_x.
    speed_requires_forward_delta_m: 0.005

    # --- Comfort / control ---
    steer_penalty: 0.15            # magnitude of steer change (rad per step)

    # --- Episode economics (no free lunch for stalling; crash still dominates return) ---
    survival_reward: 0.0          # 0: do not pay the agent per step for simply not dying
    # Stage 7: restored to s1-era -0.003.
    time_penalty_per_step: -0.003

    # --- Events (hybrid sparse on top of dense) ---
    # Stage 7: restored to s1-era 0.8. The 30.0 bin bonus introduced massive
    # value-function variance and pushed the policy into unstable regimes.
    dense_checkpoint_bonus: 0.8   # one-shot when crossing a new progress bin (aligns with progress_bins)
    lap_bonus: 1000.0
    # Stage 7: restored to s1-era -120. The -200/-300 escalation didn't teach
    # braking; it just made crashes scarier, which paradoxically made the
    # policy *avoid corners entirely* (slow-crawl).
    collision_penalty: -120.0     # must dominate spurious per-step terms so "crash early" is never attractive

    # --- Used when reward.type == sparse (milestone + lap only) ---
    checkpoint_reward: 1.0

    # --- Maps without centerline CSV only (prefer make_centerlines.py) ---
    fallback_vel_scale: 0.02


  domain_randomization:
    enabled: true
    friction_range: [0.85, 1.15]
    mass_range: [3.4, 4.1]
    stiffness_range: [0.9, 1.1]
    lidar_noise_std: 0.02
    lidar_dropout_prob: 0.01
    max_action_delay: 2         # steps (0.01s each)

  backtrack:
    enabled: false
    seconds: 2.0                # how many seconds to go back on collision
    max_backtracks: 3           # how many times to try from the same crash before full reset

  # Multi-map training: policy randomly picks a map each episode reset, weighted
  # by the `weight` field (default 1). Stage 9: pull back to 30/70 — with the
  # speed cap, vegas behavior changes substantially so we need some vegas
  # exposure to keep the policy generalising rather than over-specialising
  # on berlin.
  training_maps:
    - name: vegas
      map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/vegas
      map_ext: .png
      start_pose: [0.0, 0.0, 0.0]
      randomize_start: true
      weight: 3              # 30% of episodes during Stage 9
    - name: berlin
      map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/berlin
      map_ext: .png
      start_pose: [0.0, 0.0, 1.37]
      randomize_start: true
      weight: 7              # 70% of episodes during Stage 9
    - name: levine
      map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/levine
      map_ext: .pgm
      start_pose: [-0.025, -0.175, 0.0]
      randomize_start: true
      weight: 0              # disabled by default; --maps to opt back in

  # Fallback single-map fields (used if training_maps is removed)
  map_name: berlin
  map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/berlin
  map_ext: .png
  start_pose: [0.0, 0.0, 1.37]

evaluate:
  map_name: berlin
  map_path: /home/yim/f1tenth_gym/gym/f110_gym/envs/maps/berlin
  map_ext: .png
  start_pose: [0.0, 0.0, 1.37]
  num_episodes: 10
  render: false
