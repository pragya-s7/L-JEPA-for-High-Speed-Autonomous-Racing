# L-JEPA Configuration

gym:
  gym_path: ./f1tenth_gym
  timestep: 0.01
  integrator: RK4
  num_beams: 1080
  fov: 4.7

maps:
  - name: levine_2nd
    map_path: ./levine_2nd
    map_ext: .pgm
    start_pose: [0.0, 0.0, 0.0]

data_collection:
  output_dir: ./data
  episodes_per_map: 20
  max_steps_per_episode: 3000
  context_window: 4
  prediction_horizon: 30
  min_episode_steps: 100
  controller: follow_the_gap

model:
  lidar_subsample: 5
  lidar_dim: 216
  vel_dim: 2
  obs_dim: 218
  context_window: 4
  action_dim: 2
  latent_dim: 64
  prediction_horizon: 30

  encoder:
    channels: [32, 64, 128]
    kernel_size: 5
    stride: 2

  predictor:
    hidden_dims: [256, 256]

pretrain:
  epochs: 100
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-5
  ema_decay: 0.996
  prediction_horizon: 30
  checkpoint_dir: ./checkpoints/pretrain
  log_every: 10

rl:
  checkpoint_dir: ./checkpoints/rl
  encoder_checkpoint: ./checkpoints/pretrain/best.pt
  total_steps: 10_000_000
  rollout_steps: 2048
  num_envs: 1
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  epochs_per_update: 10
  minibatch_size: 64
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  log_every: 5
  eval_every: 20

  centerline_dir: ./data/centerlines

  reward:
    type: dense
    progress_weight: 15.0
    deviation_weight: 0.1
    speed_weight: 0.1
    steer_penalty: 0.5
    survival_reward: 0.1
    collision_penalty: -10.0
    checkpoint_reward: 1.0
    lap_bonus: 10.0
    wall_penalty: 2.0
    wall_threshold: 0.5

  domain_randomization:
    enabled: true
    friction_range: [0.8, 1.2]
    mass_range: [3.0, 4.5]
    stiffness_range: [0.8, 1.2]
    lidar_noise_std: 0.02
    lidar_dropout_prob: 0.01
    max_action_delay: 3

  backtrack:
    enabled: false
    seconds: 2.0
    max_backtracks: 3

  training_maps:
    - name: levine_2nd
      map_path: ./levine_2nd
      map_ext: .pgm
      start_pose: [0.0, 0.0, 0.0]

evaluate:
  map_name: levine_2nd
  map_path: ./levine_2nd
  map_ext: .pgm
  start_pose: [0.0, 0.0, 0.0]
  num_episodes: 10
  render: false
