gym:
  gym_path: /home/ubuntu/f1tenth_gym
  timestep: 0.01
  integrator: RK4
  num_beams: 1080
  fov: 4.7

data_collection:
  output_dir: /home/ubuntu/L-JEPA-for-High-Speed-Autonomous-Racing/data/levine
  episodes_per_map: 20
  max_steps_per_episode: 1200
  context_window: 4
  prediction_horizon: 5
  min_episode_steps: 120
  controller: follow_the_gap

model:
  lidar_subsample: 5
  lidar_dim: 216
  vel_dim: 2
  obs_dim: 218
  context_window: 4
  action_dim: 2
  latent_dim: 64
  prediction_horizon: 5
  encoder:
    channels: [32, 64, 128]
    kernel_size: 5
    stride: 2
  predictor:
    hidden_dims: [256, 256]

pretrain:
  epochs: 20
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-5
  ema_decay: 0.996
  prediction_horizon: 5
  checkpoint_dir: /home/ubuntu/L-JEPA-for-High-Speed-Autonomous-Racing/checkpoints/levine_pretrain
  log_every: 2

rl:
  checkpoint_dir: /home/ubuntu/L-JEPA-for-High-Speed-Autonomous-Racing/checkpoints/levine_rl
  encoder_checkpoint: /home/ubuntu/L-JEPA-for-High-Speed-Autonomous-Racing/checkpoints/levine_pretrain/best.pt
  total_steps: 30000
  rollout_steps: 1024
  num_envs: 1
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  epochs_per_update: 8
  minibatch_size: 128
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  log_every: 1
  eval_every: 10
  reward:
    progress_weight: 1.0
    collision_penalty: -10.0
    velocity_bonus: 0.0
  training_maps:
    - name: levine
      map_path: /home/ubuntu/f1tenth_gym/gym/f110_gym/envs/maps/levine
      map_ext: .pgm
      start_pose: [0.0, 0.0, 0.0]

evaluate:
  map_name: levine
  map_path: /home/ubuntu/f1tenth_gym/gym/f110_gym/envs/maps/levine
  map_ext: .pgm
  start_pose: [0.0, 0.0, 0.0]
  num_episodes: 5
  render: false
